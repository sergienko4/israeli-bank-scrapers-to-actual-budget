# Trivy secret scanning configuration
# https://trivy.dev/docs/v0.69/guide/scanner/secret/
#
# All built-in rules are enabled by default.
# allow-rules below suppress known false positives in the Docker image.

allow-rules:
  # Documentation files inside npm's bundled packages contain example credentials
  # (e.g. README files showing API key format examples) — not real secrets.
  - id: allow-npm-internal-docs
    description: Skip documentation files inside npm's own bundled node_modules
    path: usr/local/lib/node_modules/npm/.*\.(md|txt|rst|html|json)

  # The app's node_modules contain README files with example tokens/keys.
  - id: allow-app-node-modules-docs
    description: Skip documentation files inside app node_modules
    path: app/node_modules/.*\.(md|txt|rst|html)
