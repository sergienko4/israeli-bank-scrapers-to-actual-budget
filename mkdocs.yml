site_name: Israeli Bank Importer
site_description: Automatically import transactions from 19 Israeli banks and credit cards into Actual Budget.
site_url: https://sergienko4.github.io/israeli-bank-scrapers-to-actual-budget/
repo_url: https://github.com/sergienko4/israeli-bank-scrapers-to-actual-budget
repo_name: sergienko4/israeli-bank-scrapers-to-actual-budget
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

not_in_nav: |
  BANKS.md
  DEPLOYMENT.md
  PRD-TEMPLATE.md
  banks/union.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      strict: false
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sergienko4/israeli-bank-scrapers-to-actual-budget
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/sergienko4/israeli-bank-importer

