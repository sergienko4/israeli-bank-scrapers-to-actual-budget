      - Mizrahi Tefahot: banks/mizrahi.md
      - Mercantile: banks/mercantile.md
      - Otsar Hahayal: banks/otsarHahayal.md
      - Beinleumi: banks/beinleumi.md
      - Massad: banks/massad.md
      - Yahav: banks/yahav.md
      - Beyahad Bishvilha: banks/beyahadBishvilha.md
      - Behatsdaa: banks/behatsdaa.md
      - Pagi: banks/pagi.md
      - One Zero: banks/oneZero.md
      - PayBox: banks/paybox.md
      - Pepper: banks/pepper.md
      - Visa Cal: banks/visaCal.md
      - Max: banks/max.md
