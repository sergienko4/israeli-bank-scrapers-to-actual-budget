name: Real E2E (Oracle VM)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: real-e2e
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/sergienko4/israeli-bank-scrapers-to-actual-budget
  VM_WORK_DIR: /home/ubuntu/real-e2e
  PROD_COMPOSE: /home/ubuntu/actual-data/docker-compose.yml

jobs:
  real-e2e:
    name: Real Bank E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Build & push image to GHCR ────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.GHCR_IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Stop production ───────────────────────────────────────────

      - name: Stop production containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          script: docker-compose -f ${{ env.PROD_COMPOSE }} stop

      # ── Prepare test environment on VM ────────────────────────────

      - name: Clean and prepare VM workspace
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          script: |
            sudo rm -rf ${{ env.VM_WORK_DIR }}
            mkdir -p ${{ env.VM_WORK_DIR }}/data ${{ env.VM_WORK_DIR }}/logs
            chmod -R 777 ${{ env.VM_WORK_DIR }}/data ${{ env.VM_WORK_DIR }}/logs

      - name: Pull PR image on VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          envs: GITHUB_TOKEN
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.GHCR_IMAGE }}:pr-${{ github.event.pull_request.number }}
            docker tag ${{ env.GHCR_IMAGE }}:pr-${{ github.event.pull_request.number }} israeli-bank-importer:real-e2e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy compose and scripts to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          source: "docker-compose.real-e2e.yml,scripts/real-e2e/create-budget.mjs,scripts/real-e2e/verify.mjs"
          target: ${{ env.VM_WORK_DIR }}
          overwrite: true

      - name: Flatten scripts in VM workspace
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          script: |
            cd ${{ env.VM_WORK_DIR }}
            mv scripts/real-e2e/*.mjs . 2>/dev/null || true
            rm -rf scripts 2>/dev/null || true

      # ── Create local budget ──────────────────────────────────────

      - name: Create local test budget
        id: budget
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          capture_stdout: true
          script: |
            cd ${{ env.VM_WORK_DIR }}
            docker run --rm \
              -v ${{ env.VM_WORK_DIR }}/data:/app/data \
              -v ${{ env.VM_WORK_DIR }}/create-budget.mjs:/app/scripts/real-e2e/create-budget.mjs:ro \
              israeli-bank-importer:real-e2e \
              node /app/scripts/real-e2e/create-budget.mjs

      - name: Extract budget ID
        id: bid
        run: |
          BUDGET_ID=$(echo "${{ steps.budget.outputs.stdout }}" | grep -oE 'BUDGET_ID=[^ ]+' | cut -d= -f2)
          echo "Budget ID: $BUDGET_ID"
          echo "id=$BUDGET_ID" >> "$GITHUB_OUTPUT"

      # ── Deploy config & run importer (local budget mode) ─────────

      - name: Deploy encrypted config.json to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          envs: REAL_E2E_CONFIG_ENCRYPTED
          script: echo "$REAL_E2E_CONFIG_ENCRYPTED" > ${{ env.VM_WORK_DIR }}/config.json
        env:
          REAL_E2E_CONFIG_ENCRYPTED: ${{ secrets.REAL_E2E_CONFIG_ENCRYPTED }}

      - name: "Run importer (real bank scraping)"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          command_timeout: 20m
          envs: ENCRYPTION_PASSWORD,BUDGET_ID
          script: |
            cd ${{ env.VM_WORK_DIR }}
            docker run --rm \
              --cap-drop ALL --cap-add SYS_ADMIN \
              --tmpfs /dev/shm:size=256m \
              -e TZ=Asia/Jerusalem \
              -e CREDENTIALS_ENCRYPTION_PASSWORD="$ENCRYPTION_PASSWORD" \
              -e E2E_LOCAL_BUDGET_ID="$BUDGET_ID" \
              -v ${{ env.VM_WORK_DIR }}/config.json:/app/config.json:ro \
              -v ${{ env.VM_WORK_DIR }}/data:/app/data \
              -v ${{ env.VM_WORK_DIR }}/logs:/app/logs \
              israeli-bank-importer:real-e2e \
              node dist/Index.js
            EXIT_CODE=$?
            echo "Importer exit code: $EXIT_CODE"
            if [ $EXIT_CODE -gt 1 ]; then
              echo "Importer crashed with exit code $EXIT_CODE"
              exit 1
            fi
            exit 0
        env:
          ENCRYPTION_PASSWORD: ${{ secrets.REAL_E2E_ENCRYPTION_PASSWORD }}
          BUDGET_ID: ${{ steps.bid.outputs.id }}

      # ── Verify results ────────────────────────────────────────────

      - name: Verify import results
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          envs: BUDGET_ID
          script: |
            cd ${{ env.VM_WORK_DIR }}
            docker run --rm \
              -v ${{ env.VM_WORK_DIR }}/data:/app/data \
              -v ${{ env.VM_WORK_DIR }}/verify.mjs:/app/scripts/real-e2e/verify.mjs:ro \
              israeli-bank-importer:real-e2e \
              node /app/scripts/real-e2e/verify.mjs "$BUDGET_ID"
        env:
          BUDGET_ID: ${{ steps.bid.outputs.id }}

      - name: Collect importer logs
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          script: cat ${{ env.VM_WORK_DIR }}/logs/*.log 2>/dev/null | head -200 || echo 'No logs found'

      # ── Cleanup & restart production ──────────────────────────────

      - name: Cleanup test environment
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          script: |
            docker rmi israeli-bank-importer:real-e2e 2>/dev/null || true
            docker rmi ${{ env.GHCR_IMAGE }}:pr-${{ github.event.pull_request.number }} 2>/dev/null || true
            docker logout ghcr.io 2>/dev/null || true
            sudo rm -rf ${{ env.VM_WORK_DIR }}

      - name: Restart production
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          port: ${{ secrets.ORACLE_VM_PORT }}
          script: docker-compose -f ${{ env.PROD_COMPOSE }} start
