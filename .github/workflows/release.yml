name: Docker Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g., v1.9.0)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOCKER_IMAGE: sergienko4/israeli-bank-importer
  GHCR_IMAGE: ghcr.io/sergienko4/israeli-bank-importer

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # For workflow_dispatch, checkout the requested tag (not the default
          # branch) so we build the historical commit, preserving release
          # provenance. For tag-push events, github.ref already points at the
          # tag so leaving ref unset (default) is correct.
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      # When republishing an old tag via workflow_dispatch, actions/checkout
      # above rewinds the worktree to that tag — which may pre-date changes
      # to local composite actions in .github/actions/. The active workflow
      # file (release.yml) is loaded from the workflow run's commit
      # (github.sha), NOT the checked-out tag, so it can reference inputs
      # that don't exist in the historical composite. Overlay .github/actions/
      # from the WORKFLOW COMMIT (github.sha) so the workflow file and the
      # composite actions it references are guaranteed to be from the same
      # commit — deterministic even if main advances mid-run. Image content
      # (Dockerfile, src, deps) is still from the requested tag; only the
      # CI tooling is refreshed. Step is gated on workflow_dispatch so
      # tag-push releases (the production path) are completely unaffected.
      # Grep assertions fail fast if the overlay didn't deliver the expected
      # composite schema, e.g. if a future refactor renames the inputs.
      - name: Overlay workflow CI tooling (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          TOOLING_SHA: ${{ github.sha }}
        run: |
          git cat-file -e "${TOOLING_SHA}^{commit}" 2>/dev/null \
            || git fetch --depth=1 origin "${TOOLING_SHA}"
          git checkout "${TOOLING_SHA}" -- .github/actions/
          grep -qE '^  provenance:' .github/actions/docker/build-image/action.yml \
            || { echo "::error::Overlay missing 'provenance' input — composite schema unexpected"; exit 1; }
          grep -qE '^  sbom:' .github/actions/docker/build-image/action.yml \
            || { echo "::error::Overlay missing 'sbom' input — composite schema unexpected"; exit 1; }
          echo "::notice::Overlaid .github/actions/ from workflow commit ${TOOLING_SHA}"

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: Invalid tag format: $TAG (expected v1.2.3)"
              exit 1
            fi
            echo "version=$TAG" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Verify tag matches manifest
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          MANIFEST_VERSION=$(jq -r '.["."]//"unknown"' config/release-please/manifest.json)
          if [ "$VERSION" != "v${MANIFEST_VERSION}" ]; then
            echo "::error::Tag $VERSION does not match manifest v${MANIFEST_VERSION}"
            exit 1
          fi

      - name: Verify CHANGELOG entry
        run: |
          BARE="${{ steps.tag.outputs.version }}"
          BARE="${BARE#v}"
          if ! grep -q "## \[${BARE}\]" CHANGELOG.md; then
            echo "::warning::No CHANGELOG entry for ${BARE}"
          fi

      - name: Login to Docker Hub
        # Best-effort: missing/invalid DOCKERHUB_* secrets must NOT fail the
        # release. The Docker Hub push step is also continue-on-error, so the
        # release still publishes to GHCR even when Docker Hub auth fails.
        id: login_dockerhub
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (GHCR)
        id: meta_ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: ${{ steps.tag.outputs.version }}

      - name: Extract metadata (Docker Hub)
        id: meta_dockerhub
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: ${{ steps.tag.outputs.version }}

      - name: Build for smoke test (amd64)
        uses: ./.github/actions/docker/build-image
        with:
          tag: ${{ env.DOCKER_IMAGE }}:smoke-test
          platforms: linux/amd64
          push: 'false'
          load: 'true'
          cache-suffix: release

      - name: Scraper API smoke test (verify createScraper inside image)
        # The current scraper API manages the browser lifecycle inside
        # .scrape() — there is no separate .initialize()/.terminate().
        # This smoke just verifies the package imports and exposes the
        # expected public surface; full browser launch is covered by
        # the E2E suite.
        run: |
          docker run --rm --cap-add SYS_ADMIN ${{ env.DOCKER_IMAGE }}:smoke-test \
            node --input-type=module -e "
              import { createScraper } from '@sergienko4/israeli-bank-scrapers';
              const s = createScraper({ companyId: 'hapoalim', startDate: new Date() });
              if (typeof s.scrape !== 'function') {
                throw new Error('Scraper API broken: .scrape() missing');
              }
              console.log('Scraper API smoke test passed');
            "

      # GHCR is the primary, REQUIRED publish target. GitHub-internal network
      # avoids the Docker Hub edge proxy 400 errors that have made Docker Hub
      # pushes flaky for this image (~2.7GB, large Camoufox layer).
      - name: Push to GHCR (primary)
        id: push_ghcr
        uses: ./.github/actions/docker/build-image
        with:
          tag: ${{ steps.meta_ghcr.outputs.tags }}
          labels: ${{ steps.meta_ghcr.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: 'true'
          load: 'false'
          cache-suffix: release

      # Docker Hub is the secondary, BEST-EFFORT target. Failure here does NOT
      # fail the release — users can pull from GHCR.
      #
      # Why regctl instead of a second buildx push:
      # Docker Hub's HAProxy edge proxy was rejecting BuildKit's multi-arch
      # parallel layer uploads with `400 Bad request: Your browser sent an
      # invalid request`, breaking v1.38.1 publish across 4 attempts. BuildKit
      # finalizes blob uploads with a long `?_state=<base64 token>&digest=...`
      # query string AND opens multiple concurrent PUT connections per
      # platform, which together trip Docker Hub's WAF.
      #
      # regctl uses a plain, sequential per-blob PUT/PATCH protocol — the
      # request shape registries have always expected — and reuses the bytes
      # already on GHCR (no rebuild, no QEMU emulation, no Camoufox download).
      # Both Docker logins above wrote credentials to ~/.docker/config.json,
      # which regctl reads natively, so no extra secret plumbing is needed.
      #
      # Cross-registry blob mount is not supported by Docker Hub free tier, so
      # regctl streams the bytes (~2.7 GB multi-arch) from GHCR to DH via the
      # runner. That's fine — it costs ~2 min and only runs after a successful
      # GHCR push, so we never burn CI minutes on a failed build.
      - name: Install regctl
        # Pinned by version + SHA-256 for supply-chain safety. Direct download
        # from the official regclient/regclient release avoids depending on a
        # third-party installer action.
        env:
          REGCTL_VERSION: v0.11.5
          REGCTL_SHA256: c93aa7638749f5aaac1a8e01787321889c78f0101809bb2880343478d0ba0467
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/regctl \
            "https://github.com/regclient/regclient/releases/download/${REGCTL_VERSION}/regctl-linux-amd64"
          echo "${REGCTL_SHA256}  /tmp/regctl" | sha256sum -c -
          install -m 0755 /tmp/regctl /usr/local/bin/regctl
          rm -f /tmp/regctl
          regctl version

      - name: Promote image from GHCR to Docker Hub via regctl
        id: push_dockerhub
        continue-on-error: true
        # `regctl image copy` preserves the multi-arch manifest list, all
        # platform manifests, and all referenced blobs. The destination tag on
        # Docker Hub ends up byte-identical to the GHCR source.
        run: |
          set -euo pipefail
          SRC="${GHCR_IMAGE}:${{ steps.tag.outputs.version }}"
          DST="${DOCKER_IMAGE}:${{ steps.tag.outputs.version }}"
          echo "::notice::Promoting ${SRC} → ${DST}"
          regctl image copy --digest-tags "${SRC}" "${DST}"
          echo "::group::Verify destination manifest"
          regctl manifest get "${DST}"
          echo "::endgroup::"

      - name: Warn if Docker Hub push failed
        if: steps.push_dockerhub.outcome == 'failure'
        run: |
          echo "::warning::Docker Hub push failed for ${{ steps.tag.outputs.version }} — image is published only to GHCR (${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.version }})"

      - name: Generate SBOM
        # Generate SBOM from the GHCR image (always available since GHCR push
        # is required). Anchore pulls the image to scan it; using GHCR avoids
        # any Docker Hub dependency in the SBOM path.
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.version }}
          output-file: sbom.spdx.json
          artifact-name: sbom-${{ steps.tag.outputs.version }}.spdx.json

      - name: Build enriched release notes
        env:
          # Surface the Docker Hub push outcome to the bash script so the
          # release notes only advertise the Docker Hub URL when the mirror
          # actually published. Otherwise users get a 404 from `docker pull`.
          DOCKERHUB_OUTCOME: ${{ steps.push_dockerhub.outcome }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 ${VERSION}^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMIT_COUNT=$(git rev-list --count ${PREV_TAG}..${VERSION})
            FILES_CHANGED=$(git diff --name-only ${PREV_TAG}..${VERSION} | wc -l | tr -d ' ')
            SHORTSTAT=$(git diff --shortstat ${PREV_TAG}..${VERSION})
            LINES_ADDED=$(echo "$SHORTSTAT" | grep -oP '\d+(?= insertions?)' || echo "0")
            LINES_DELETED=$(echo "$SHORTSTAT" | grep -oP '\d+(?= deletions?)' || echo "0")
            COMPARE_URL="https://github.com/sergienko4/israeli-bank-scrapers-to-actual-budget/compare/${PREV_TAG}...${VERSION}"
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
            FILES_CHANGED="N/A"
            LINES_ADDED="N/A"
            LINES_DELETED="N/A"
            COMPARE_URL=""
          fi

          {
            echo "## Docker"
            echo ""
            if [ "$DOCKERHUB_OUTCOME" = "success" ]; then
              echo 'Multi-arch images (`linux/amd64`, `linux/arm64`) are published to two registries:'
              echo ""
              echo "**GHCR (primary, always available):**"
              echo ""
              echo '```bash'
              echo "docker pull ghcr.io/sergienko4/israeli-bank-importer:${VERSION}"
              echo '```'
              echo ""
              echo "**Docker Hub (mirror):**"
              echo ""
              echo '```bash'
              echo "docker pull sergienko4/israeli-bank-importer:${VERSION}"
              echo '```'
            else
              echo 'Multi-arch images (`linux/amd64`, `linux/arm64`) are published to GHCR:'
              echo ""
              echo '```bash'
              echo "docker pull ghcr.io/sergienko4/israeli-bank-importer:${VERSION}"
              echo '```'
              echo ""
              echo "_Docker Hub mirror push did not succeed for this release — pull from GHCR above._"
            fi
            echo ""

            echo "## Commits"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log ${PREV_TAG}..${VERSION} --pretty=format:"- %s (%h)"
            else
              git log --pretty=format:"- %s (%h)" -10
            fi
            echo ""
            echo ""

            echo "## Release Statistics"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Commits | ${COMMIT_COUNT} |"
            echo "| Files changed | ${FILES_CHANGED} |"
            echo "| Lines added | +${LINES_ADDED} |"
            echo "| Lines deleted | -${LINES_DELETED} |"
            echo "| Platforms | linux/amd64, linux/arm64 |"
            echo ""

            echo "---"
            echo ""

            echo "## Quick Start"
            echo ""
            echo '```bash'
            echo "docker run -d \\"
            echo "  --name israeli-bank-importer \\"
            echo "  --cap-add=SYS_ADMIN \\"
            echo "  -v /path/to/config.json:/app/config.json:ro \\"
            echo "  -e SCHEDULE=\"0 9 * * *\" \\"
            echo "  -e TZ=Asia/Jerusalem \\"
            echo "  ghcr.io/sergienko4/israeli-bank-importer:${VERSION}"
            echo '```'
            echo ""

            echo "<details><summary>Docker Compose example</summary>"
            echo ""
            echo '```yaml'
            echo "services:"
            echo "  israeli-bank-importer:"
            echo "    image: ghcr.io/sergienko4/israeli-bank-importer:${VERSION}"
            echo "    restart: always"
            echo "    cap_add:"
            echo "      - SYS_ADMIN"
            echo "    volumes:"
            echo "      - ./config.json:/app/config.json:ro"
            echo "      - ./data:/app/data"
            echo "      - ./cache:/app/cache"
            echo "      - ./chrome-data:/app/chrome-data"
            echo "    environment:"
            echo "      - TZ=Asia/Jerusalem"
            echo "      - SCHEDULE=0 */8 * * *"
            echo '```'
            echo ""
            echo "</details>"
            echo ""

            echo "## Upgrading"
            echo ""
            echo '```bash'
            echo "docker compose pull && docker compose up -d"
            echo '```'
            echo ""

            echo "---"
            echo ""

            echo "**Docs:** [README](https://github.com/sergienko4/israeli-bank-scrapers-to-actual-budget) | [Supported Banks](https://github.com/sergienko4/israeli-bank-scrapers-to-actual-budget/blob/main/docs/BANKS.md) | [Deployment Guide](https://github.com/sergienko4/israeli-bank-scrapers-to-actual-budget/blob/main/docs/DEPLOYMENT.md) | [GHCR](https://github.com/sergienko4/israeli-bank-scrapers-to-actual-budget/pkgs/container/israeli-bank-importer) | [Docker Hub](https://hub.docker.com/r/sergienko4/israeli-bank-importer)"
            echo ""

            if [ -n "$COMPARE_URL" ]; then
              echo "**Full Changelog:** ${COMPARE_URL}"
            fi
          } > enriched_notes.md

      - name: Attach SBOM and enrich release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          append_body: true
          body_path: enriched_notes.md
          files: sbom.spdx.json
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Update Docker Hub description
        # Only attempt when the Docker Hub push itself succeeded — if the
        # registry is rejecting us, no point updating the description.
        # Marked best-effort so a Docker Hub API hiccup doesn't fail a
        # release whose images already published successfully.
        if: steps.push_dockerhub.outcome == 'success'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_IMAGE }}
          short-description: "Import transactions from 19 Israeli banks and credit cards into Actual Budget. Docker, TypeScript, Telegram bot."
          readme-filepath: ./README.docker-hub.md
