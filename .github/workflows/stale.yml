name: Stale Issues

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    name: Close stale issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 7 days if no further activity occurs.
          close-issue-message: >
            This issue was closed because it has been stale for 67 days with no activity.
            Feel free to reopen if this is still relevant.
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: bug,security,enhancement,good first issue
          stale-issue-label: stale
          operations-per-run: 30
