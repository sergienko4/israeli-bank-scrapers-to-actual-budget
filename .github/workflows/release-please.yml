name: Release Please

on:
  push:
    branches:
      - main

# release-please-action passes `secrets.RELEASE_TOKEN` explicitly and the
# badge job uses `secrets.GIST_SECRET` for the external gist - neither
# needs GITHUB_TOKEN write scopes. `contents: read` covers the checkout
# step, nothing more.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: config/release-please/config.json
          manifest-file: config/release-please/manifest.json

  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/ci/setup
      # portal-ui.e2e.test.ts launches the product's own Camoufox browser and is
      # designed to never skip ("a missing browser fails the test loudly"), so
      # the E2E badge count below must provision the browser exactly like the
      # real E2E job (_e2e-suite.yml). Without this the E2E run exits 1 and the
      # whole Release Please workflow shows red on every push to main, even
      # though the release itself succeeds. Docker-image-gated E2Es still skip
      # here (no israeli-bank-importer:e2e image is built in this counting job).
      - name: Ensure Camoufox browser for portal E2E
        uses: ./.github/actions/docker/camoufox-cache
      - name: Run unit tests with JSON reporter
        run: npx vitest run --config config/vitest.config.ts --reporter=json --outputFile=test-results.json
      - name: Run E2E tests with JSON reporter
        run: npx vitest run --config config/vitest.config.e2e.ts --reporter=json --outputFile=e2e-results.json
        env:
          E2E_TELEGRAM_BOT_TOKEN: ${{ secrets.E2E_TELEGRAM_BOT_TOKEN }}
          E2E_TELEGRAM_CHAT_ID: ${{ secrets.E2E_TELEGRAM_CHAT_ID }}
      - name: Extract test counts
        run: |
          UNIT=$(jq '.numTotalTests' test-results.json)
          E2E=$(jq '.numTotalTests' e2e-results.json)
          echo "UNIT_COUNT=$UNIT" >> $GITHUB_ENV
          echo "E2E_COUNT=$E2E" >> $GITHUB_ENV
      - name: Update unit test badge
        uses: schneegans/dynamic-badges-action@v1.9.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 2860e2ffec3d5919e4b658fed5ce4e5e
          filename: actual-budget-importer-test-count.json
          label: unit tests
          message: "${{ env.UNIT_COUNT }} passed"
          color: brightgreen
      - name: Update E2E test badge
        uses: schneegans/dynamic-badges-action@v1.9.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 2860e2ffec3d5919e4b658fed5ce4e5e
          filename: actual-budget-importer-e2e-count.json
          label: e2e tests
          message: "${{ env.E2E_COUNT }} passed"
          color: blue
