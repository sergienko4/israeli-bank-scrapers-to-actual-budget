name: Deploy Docs Site

# Publishes the MkDocs Material site + TypeDoc API reference to GitHub Pages.
#
# Triggers:
#   - push to main: keeps the published site in sync with the trunk so README
#     links to https://sergienko4.github.io/.../<page>/ never go stale between
#     releases. TypeDoc tracks src/, so any source change should rebuild too.
#   - push of a release tag `v*`: rebuilds at the released SHA.
#   - manual workflow_dispatch: operator-triggered redeploy.
#
# The build runs in ~3 minutes; we deliberately do not use a `paths` filter
# because release tags pushed by release-please touch CHANGELOG/manifest at
# the repo root (not docs/), which would skip the deploy at release time.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new tag fires
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: ./.github/actions/ci/setup

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs deps
        run: pip install -r requirements-docs.txt

      - name: Generate TypeDoc API docs
        run: npm run docs

      - name: Build MkDocs site
        run: python -m mkdocs build --strict

      - name: Merge API docs into site
        run: |
          mkdir -p site/api
          cp -r docs/api/. site/api/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
