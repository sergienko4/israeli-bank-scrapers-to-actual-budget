name: E2E Suite (reusable)

# Reusable E2E pipeline shared by pr.yml (per-PR) and e2e-schedule.yml
# (weekly). Centralises the Docker build + browser-smoke + import-runs +
# pipeline-verify sequence so a fix lands in one place across both
# callers. Caller passes a timeout and standard E2E secrets.

on:
  workflow_call:
    inputs:
      timeout-minutes:
        description: Job wall-time cap in minutes.
        type: number
        default: 25
    secrets:
      E2E_TELEGRAM_BOT_TOKEN:
        required: false
      E2E_TELEGRAM_CHAT_ID:
        required: false
      GOOGLE_CLIENT_ID:
        required: false
      GOOGLE_CLIENT_SECRET:
        required: false
      GOOGLE_REDIRECT_URI:
        required: false

# Reusable workflow runs locally only: checkout, build, docker build/run.
# No SARIF upload, no commit/PR writes, no package pushes. Lock down to
# the bare minimum (contents:read for checkout) regardless of what the
# caller workflow grants.
permissions:
  contents: read

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/ci/setup

      - name: Google OAuth config-validity smoke (secret-gated)
        # Validates the real Google OAuth credentials without a browser: probes
        # Google's token endpoint with an invalid code (invalid_grant = valid
        # client_id/secret + registered redirect_uri). Self-skips (exit 0) when
        # the GOOGLE_* secrets are absent, so forks and secret-less runs stay
        # green. No client_id/secret is ever printed.
        run: npm run smoke:google-config
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}

      - name: Build TypeScript
        run: npm run build

      - uses: ./.github/actions/docker/build-image
        with:
          tag: israeli-bank-importer:e2e
          push: 'false'
          load: 'true'

      - name: Create test budget
        run: npm run test:e2e:setup
      - name: Extract budget ID
        id: budget
        run: |
          BUDGET_ID=$(ls tests/e2e/fixtures/e2e-data/ | grep "e2e-test-budget-" | head -1)
          echo "id=$BUDGET_ID" >> "$GITHUB_OUTPUT"
          echo "Budget ID: $BUDGET_ID"
      - name: Fix permissions for Docker volume
        run: chmod -R 777 tests/e2e/fixtures/e2e-data

      - name: Scraper API smoke test (verify createScraper inside image)
        # The current scraper API manages the browser lifecycle inside
        # .scrape() — there is no separate .initialize()/.terminate().
        # This smoke just verifies the package imports and exposes the
        # expected public surface; full browser launch is covered by
        # Run #1/#2 below.
        run: |
          docker run --rm israeli-bank-importer:e2e \
            node --input-type=module -e "
              import { createScraper } from '@sergienko4/israeli-bank-scrapers';
              const s = createScraper({ companyId: 'hapoalim', startDate: new Date() });
              if (typeof s.scrape !== 'function') {
                throw new Error('Scraper API broken: .scrape() missing');
              }
              console.log('Scraper API smoke test passed');
            "

      - name: "Run #1: First import (creates transactions)"
        run: |
          set +e
          docker run --rm \
            -v ${{ github.workspace }}/tests/e2e/fixtures/config.generated.json:/app/config.json:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/mock-scraper-dir:/app/mock-scraper-dir:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/e2e-data:/app/data \
            -e E2E_MOCK_SCRAPER_DIR=/app/mock-scraper-dir \
            -e E2E_LOCAL_BUDGET_ID=${{ steps.budget.outputs.id }} \
            israeli-bank-importer:e2e \
            node dist/Index.js
          EXIT_CODE=$?
          echo "Run #1 exit code: $EXIT_CODE"
          if [ $EXIT_CODE -gt 1 ]; then
            echo "::error::Importer crashed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: "Run #2: Dedup verification (same data, no new transactions)"
        run: |
          set +e
          docker run --rm \
            -v ${{ github.workspace }}/tests/e2e/fixtures/config.generated.json:/app/config.json:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/mock-scraper-dir:/app/mock-scraper-dir:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/e2e-data:/app/data \
            -e E2E_MOCK_SCRAPER_DIR=/app/mock-scraper-dir \
            -e E2E_LOCAL_BUDGET_ID=${{ steps.budget.outputs.id }} \
            israeli-bank-importer:e2e \
            node dist/Index.js
          EXIT_CODE=$?
          echo "Run #2 exit code: $EXIT_CODE"
          if [ $EXIT_CODE -gt 1 ]; then
            echo "::error::Importer crashed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Ensure Camoufox browser for portal E2E
        # Both portal E2Es drive the real served SPA in Camoufox on the runner
        # host: portal-ui.e2e.test.ts (in-process server) and
        # portal-docker.e2e.test.ts (server inside the israeli-bank-importer:e2e
        # container, exercising the read-only/read-write config-directory mounts).
        # build-image already warms ~/.cache/camoufox, but make the dependency
        # explicit + rate-limit-safe.
        uses: ./.github/actions/docker/camoufox-cache

      - name: Verify pipeline results
        # Runs the full E2E suite (config/vitest.config.e2e.ts), including the
        # Dockerized portal round-trip (portal-docker.e2e.test.ts) which boots
        # the portal inside the israeli-bank-importer:e2e image built above and
        # proves a read-only mount blocks writes while a read-write mount persists.
        run: npm run test:e2e
        env:
          E2E_TELEGRAM_BOT_TOKEN: ${{ secrets.E2E_TELEGRAM_BOT_TOKEN }}
          E2E_TELEGRAM_CHAT_ID: ${{ secrets.E2E_TELEGRAM_CHAT_ID }}
