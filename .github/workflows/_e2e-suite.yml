name: E2E Suite (reusable)

# Reusable E2E pipeline shared by pr.yml (per-PR) and e2e-schedule.yml
# (weekly). Centralises the Docker build + browser-smoke + import-runs +
# pipeline-verify sequence so a fix lands in one place across both
# callers. Caller passes a timeout and standard E2E secrets.

on:
  workflow_call:
    inputs:
      timeout-minutes:
        description: Job wall-time cap in minutes.
        type: number
        default: 25
    secrets:
      E2E_TELEGRAM_BOT_TOKEN:
        required: false
      E2E_TELEGRAM_CHAT_ID:
        required: false

# Opt JS-action runtime into Node 24 ahead of GH's 2026-06-02 default
# switch. Value sourced from the repo-level variable (Settings ->
# Variables) so it flips in one place across all workflows.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ vars.FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 }}

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ci/setup

      - name: Build TypeScript
        run: npm run build

      - uses: ./.github/actions/docker/camoufox-cache
      - uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: israeli-bank-importer:e2e
          build-args: |
            SKIP_BROWSER_FETCH=true
            APT_CACHE_BUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create test budget
        run: npm run test:e2e:setup
      - name: Extract budget ID
        id: budget
        run: |
          BUDGET_ID=$(ls tests/e2e/fixtures/e2e-data/ | grep "e2e-test-budget-" | head -1)
          echo "id=$BUDGET_ID" >> "$GITHUB_OUTPUT"
          echo "Budget ID: $BUDGET_ID"
      - name: Fix permissions for Docker volume
        run: chmod -R 777 tests/e2e/fixtures/e2e-data

      - name: Browser smoke test (verify scraper can launch browser)
        run: |
          docker run --rm --cap-add SYS_ADMIN israeli-bank-importer:e2e \
            node --input-type=module -e "
              import { createScraper } from '@sergienko4/israeli-bank-scrapers';
              const s = createScraper({ companyId: 'hapoalim', startDate: new Date() });
              await s.initialize();
              await s.terminate(true);
              console.log('Browser smoke test passed');
            "

      - name: "Run #1: First import (creates transactions)"
        run: |
          set +e
          docker run --rm \
            -v ${{ github.workspace }}/tests/e2e/fixtures/config.generated.json:/app/config.json:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/mock-scraper-dir:/app/mock-scraper-dir:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/e2e-data:/app/data \
            -e E2E_MOCK_SCRAPER_DIR=/app/mock-scraper-dir \
            -e E2E_LOCAL_BUDGET_ID=${{ steps.budget.outputs.id }} \
            israeli-bank-importer:e2e \
            node dist/Index.js
          EXIT_CODE=$?
          echo "Run #1 exit code: $EXIT_CODE"
          if [ $EXIT_CODE -gt 1 ]; then
            echo "::error::Importer crashed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: "Run #2: Dedup verification (same data, no new transactions)"
        run: |
          set +e
          docker run --rm \
            -v ${{ github.workspace }}/tests/e2e/fixtures/config.generated.json:/app/config.json:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/mock-scraper-dir:/app/mock-scraper-dir:ro \
            -v ${{ github.workspace }}/tests/e2e/fixtures/e2e-data:/app/data \
            -e E2E_MOCK_SCRAPER_DIR=/app/mock-scraper-dir \
            -e E2E_LOCAL_BUDGET_ID=${{ steps.budget.outputs.id }} \
            israeli-bank-importer:e2e \
            node dist/Index.js
          EXIT_CODE=$?
          echo "Run #2 exit code: $EXIT_CODE"
          if [ $EXIT_CODE -gt 1 ]; then
            echo "::error::Importer crashed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Verify pipeline results
        run: npm run test:e2e
        env:
          E2E_TELEGRAM_BOT_TOKEN: ${{ secrets.E2E_TELEGRAM_BOT_TOKEN }}
          E2E_TELEGRAM_CHAT_ID: ${{ secrets.E2E_TELEGRAM_CHAT_ID }}
