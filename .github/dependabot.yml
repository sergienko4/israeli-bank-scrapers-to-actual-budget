version: 2
# Dependabot grouped weekly updates — one PR per ecosystem instead of many
# ungrouped daily PRs. Critical npm deps (@actual-app/api and
# @sergienko4/israeli-bank-scrapers) are already auto-bumped daily by
# .github/workflows/dependency-check.yml, so we IGNORE their major bumps
# here to avoid stepping on that workflow.

updates:
  # ── npm ──────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm"]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    ignore:
      # Owned by dependency-check.yml (daily auto-bump).
      - dependency-name: "@actual-app/api"
      - dependency-name: "@sergienko4/israeli-bank-scrapers"
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint*"
          - "eslint-plugin-*"
          - "eslint-config-*"
      vitest:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "vite*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "typedoc*"
          - "@biomejs/*"
      pino:
        patterns:
          - "pino*"

  # ── Docker (Dockerfile base image) ──────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
      include: scope

  # ── GitHub Actions ──────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 2
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore(ci)"
      include: scope
    groups:
      actions-core:
        patterns:
          - "actions/*"
      docker-actions:
        patterns:
          - "docker/*"
      codeql:
        patterns:
          - "github/codeql-action/*"
      security-actions:
        patterns:
          - "aquasecurity/*"
          - "anchore/*"
          - "SonarSource/*"
