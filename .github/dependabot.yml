version: 2
# Dependabot grouped weekly updates — one PR per ecosystem instead of many
# ungrouped daily PRs. Dependabot owns ALL npm dependencies, including the
# critical @actual-app/api and @sergienko4/israeli-bank-scrapers packages.
# The previous daily dependency-check.yml workflow was retired: its
# `npm update` step could not cross major versions and crashed on the
# scraper's patch-package postinstall (added in 8.6.0), so scraper updates
# never reached this repo. patch-package is now a devDependency so the
# scraper's postinstall no-ops cleanly on install.

updates:
  # ── npm ──────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm"]
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint*"
          - "eslint-plugin-*"
          - "eslint-config-*"
      vitest:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "vite*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "typedoc*"
          - "@biomejs/*"
      pino:
        patterns:
          - "pino*"

  # ── Docker (Dockerfile base image) ──────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 2
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
      include: scope

  # ── GitHub Actions ──────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 2
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore(ci)"
      include: scope
    groups:
      actions-core:
        patterns:
          - "actions/*"
      docker-actions:
        patterns:
          - "docker/*"
      codeql:
        patterns:
          - "github/codeql-action/*"
      security-actions:
        patterns:
          - "aquasecurity/*"
          - "anchore/*"
          - "SonarSource/*"
