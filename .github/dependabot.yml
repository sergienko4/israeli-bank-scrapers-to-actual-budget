version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "fix"
      include: "scope"
    ignore:
      # Critical deps handled by daily-dependency-check.yml (faster than weekly)
      - dependency-name: "@actual-app/*"
      - dependency-name: "@sergienko4/israeli-bank-scrapers"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "docker"
    commit-message:
      prefix: "fix"
      include: "scope"
    ignore:
      # Stay on even-numbered LTS Node majors only.
      # Bump manually when the next LTS lands (Node 26 LTS expected Oct 2026).
      - dependency-name: "node"
        versions: ["23.x", "25.x", "27.x", "29.x"]
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
