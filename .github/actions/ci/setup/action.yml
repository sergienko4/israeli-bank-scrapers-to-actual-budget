name: Setup CI
description: Setup Node.js with npm cache and install dependencies

inputs:
  node-version:
    description: Node.js version
    default: '22.x'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci
