name: Build Docker Image
description: |
  Composite that consolidates the Docker build sequence used by pr.yml (trivy),
  release.yml (smoke + push), and _e2e-suite.yml. Steps:
    1. Free disk space (composite)
    2. Restore Camoufox cache (composite)
    3. Set up Buildx
    4. Build (and optionally push) the image
  Inputs were originally capped at 5 (see plan §R6); the count grew to 6
  (labels) and now to 8 (provenance, sbom). The two attestation knobs are
  required for the release.yml Docker Hub leg to disable SLSA provenance +
  SBOM attestations, halving the push burst that triggers HAProxy 400 from
  Docker Hub's edge proxy. All defaults preserve existing call-site
  behavior (empty string = pass-through to build-push-action@v7 default).

inputs:
  tag:
    description: Image tag (single tag) or comma-separated list. Used as `tags:` for build-push-action.
    required: true
  platforms:
    description: Target platforms (comma-separated). Default linux/amd64 for fast PR builds.
    default: linux/amd64
  push:
    description: Push the image to the registry (true/false).
    default: 'false'
  load:
    description: Load the image into the local docker daemon (true/false). Mutually exclusive with multi-arch push.
    default: 'true'
  cache-suffix:
    description: GHA cache scope suffix (lets release vs PR use independent cache scopes).
    default: ''
  labels:
    description: Optional OCI labels (multi-line string, as emitted by docker/metadata-action).
    default: ''
  provenance:
    description: |
      SLSA provenance attestation. `false` disables; `mode=min` / `mode=max`
      enables explicitly. Empty string keeps build-push-action@v7's default
      (mode=max on multi-platform builds, mode=min otherwise). The release
      workflow's Docker Hub leg sets this to `false` to reduce edge-proxy
      push burst that triggers HAProxy 400 BadReq on this account.
    default: ''
  sbom:
    description: |
      SBOM attestation embedded in the image index. `false` disables.
      Empty string keeps build-push-action@v7's default. The repo-level
      SBOM attached to the GitHub release via `anchore/sbom-action` is
      independent of this input. The release workflow's Docker Hub leg
      sets this to `false` to reduce edge-proxy push burst.
    default: ''

runs:
  using: composite
  steps:
    - uses: ./.github/actions/ci/free-disk-space
    - uses: ./.github/actions/docker/camoufox-cache
    - uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        platforms: ${{ inputs.platforms }}
        tags: ${{ inputs.tag }}
        labels: ${{ inputs.labels }}
        provenance: ${{ inputs.provenance }}
        sbom: ${{ inputs.sbom }}
        build-args: |
          SKIP_BROWSER_FETCH=true
          APT_CACHE_BUST=${{ github.run_id }}
        cache-from: type=gha${{ inputs.cache-suffix && format(',scope={0}', inputs.cache-suffix) || '' }}
        cache-to: type=gha,mode=max${{ inputs.cache-suffix && format(',scope={0}', inputs.cache-suffix) || '' }}
