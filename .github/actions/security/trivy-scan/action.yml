name: Trivy Scan
description: Scan Docker image for vulnerabilities and upload SARIF to Security tab

inputs:
  image-ref:
    description: Docker image reference to scan
    required: true

runs:
  using: composite
  steps:
    - name: Scan for vulnerabilities and secrets
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: table
        exit-code: '1'
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        scanners: vuln,secret
        trivy-config: config/trivy/secret.yaml
        vuln-type: os,library
        skip-dirs: root/.npm

    - name: Generate SARIF report
      if: always()
      uses: aquasecurity/trivy-action@0.35.0
      with:
        image-ref: ${{ inputs.image-ref }}
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: true
        scanners: vuln,secret
        trivy-config: config/trivy/secret.yaml
        vuln-type: os,library
        skip-dirs: root/.npm

    - name: Upload SARIF to Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: trivy-results.sarif
