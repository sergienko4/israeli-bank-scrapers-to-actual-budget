# Israeli Bank Importer + Actual Budget — All-in-one Compose
#
# Usage:
#   docker compose up -d                              Start both services
#   docker compose logs -f                             Follow logs
#   docker compose down                                Stop
#   docker compose pull && docker compose up -d        Update to latest
#
# First-time setup:
#   1. mkdir config   (settings live in ./config/ — a directory, see note below)
#   2. Put your config.json (and optional credentials.json) inside ./config/
#   3. docker compose up -d actual-server
#   4. Open http://localhost:5006, create account + budget
#   5. Copy the budget's Group ID from Settings → Advanced into config/config.json syncId
#   6. Set serverURL in config/config.json to: http://actual-server:5006
#   7. docker compose up -d importer
#
# Why a ./config DIRECTORY (not ./config.json file)? The optional portal saves
# edits atomically (write temp file, then rename) which swaps the file's inode.
# A single-file bind mount pins a container to the original inode, so the
# importer would never see portal edits (and the portal's rename can fail with
# EBUSY). Mounting the directory makes edits propagate and lets the importer be
# read-only while the portal is read-write. See docs/configuration/portal.md.

services:
  actual-server:
    image: actualbudget/actual-server:latest
    container_name: actual-budget-server
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - actual-data:/data

  importer:
    image: sergienko4/israeli-bank-importer:latest
    container_name: israeli-bank-importer
    restart: unless-stopped
    depends_on:
      - actual-server
    cap_drop:
      - ALL                # Drop all capabilities first
    cap_add:
      - SYS_ADMIN          # Required for Camoufox (Firefox) browser sandboxing
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /dev/shm:size=256m       # Browser shared memory
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'
    environment:
      - TZ=Asia/Jerusalem
      # Config lives in the mounted ./config directory (see top-of-file note).
      - CONFIG_PATH=/app/config/config.json
      # Cron schedule: run every 8 hours (at midnight, 8am, 4pm)
      # Remove SCHEDULE to run once and exit
      - SCHEDULE=0 */8 * * *
      # Uncomment to decrypt encrypted credentials (see README → Encrypted Config)
      # - CREDENTIALS_ENCRYPTION_PASSWORD=your_encryption_password
      # Dry run: scrape banks and preview transactions without importing (see README → Config Validation)
      # - DRY_RUN=true
    volumes:
      # Config DIRECTORY, READ-ONLY (least privilege — the importer never writes).
      # Holds config.json + the optional credentials.json. A directory mount (not
      # a single-file mount) is required so the portal's atomic saves propagate
      # here; see the top-of-file note and docs/configuration/portal.md.
      - ./config:/app/config:ro
      - importer-data:/app/data             # Actual Budget sync data
      - importer-cache:/app/cache           # App cache
    healthcheck:
      # Verify the scheduler node process is alive (mirrors the image default and
      # the portal override below); a bare `ps aux` always exits 0 and proves nothing.
      test: ["CMD", "sh", "-c", "ps aux | grep -q '[n]ode dist/Scheduler.js'"]
      interval: 5m
      timeout: 10s
      start_period: 30s
      retries: 3

  # Optional config portal — browser UI to view/edit/add/remove config.
  # Enable by uncommenting. It shares the SAME ./config directory as the importer
  # but mounts it READ-WRITE — least privilege: importer ro (reader), portal rw
  # (the only writer). Saves propagate to the importer on its next run. Set a
  # password (the plaintext is read from PORTAL_PASSWORD/stdin, never argv, so it
  # can't leak via shell history or the process list):
  #   PORTAL_PASSWORD='yourpass' node scripts/hash-portal-password.js
  #   → copy the printed value into credentials.json portal.passwordHash
  # The portal also REQUIRES a strong portal.sessionSecret (>=16 chars) in
  # credentials.json or it refuses to boot (cookie-forgery guard). Generate one:
  #   node -e "console.log(require('crypto').randomBytes(24).toString('hex'))"
  # To expose over HTTPS, front it with a TLS reverse proxy (Caddy/Traefik) and
  # set PORTAL_SECURE_COOKIES=true. See docs/configuration/portal.md.
  # portal:
  #   image: sergienko4/israeli-bank-importer:latest
  #   container_name: israeli-bank-portal
  #   restart: unless-stopped
  #   command: ["node", "dist/Portal.js"]
  #   healthcheck:
  #     # Override the image default (it probes dist/Scheduler.js); the portal runs Portal.js.
  #     test: ["CMD", "sh", "-c", "ps aux | grep -q '[n]ode dist/Portal.js'"]
  #     interval: 5m
  #     timeout: 10s
  #     start_period: 30s
  #     retries: 3
  #   ports:
  #     - "8080:8080"                         # drop this when fronting with a TLS proxy
  #   environment:
  #     - PORTAL_ENABLED=true
  #     - PORTAL_HOST=0.0.0.0
  #     - PORTAL_CONFIG_PATH=/app/config/config.json
  #     # - PORTAL_PORT=8080
  #     # - PORTAL_SECURE_COOKIES=true        # only behind HTTPS (TLS reverse proxy)
  #     # - CREDENTIALS_ENCRYPTION_PASSWORD=your_encryption_password
  #   volumes:
  #     # Same ./config DIRECTORY as the importer, but READ-WRITE (the portal is
  #     # the only writer). credentials.json rides along inside the directory.
  #     - ./config:/app/config:rw

# Named volumes for data persistence (survive container recreation)
volumes:
  actual-data:
  importer-data:
  importer-cache:
  # importer-chrome:  # Legacy (unused with Camoufox v7.9.0+)
