# Israeli Bank Importer + Actual Budget — All-in-one Compose
#
# Usage:
#   docker compose up -d                              Start both services
#   docker compose logs -f                             Follow logs
#   docker compose down                                Stop
#   docker compose pull && docker compose up -d        Update to latest
#
# First-time setup:
#   1. docker compose up -d actual-server
#   2. Open http://localhost:5006, create account + budget
#   3. Copy the budget's Group ID from Settings → Advanced into config.json syncId
#   4. Set serverURL in config.json to: http://actual-server:5006
#   5. docker compose up -d importer

services:
  actual-server:
    image: actualbudget/actual-server:latest
    container_name: actual-budget-server
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - actual-data:/data

  importer:
    image: sergienko4/israeli-bank-importer:latest
    container_name: israeli-bank-importer
    restart: unless-stopped
    depends_on:
      - actual-server
    cap_drop:
      - ALL                # Drop all capabilities first
    cap_add:
      - SYS_ADMIN          # Required for Camoufox (Firefox) browser sandboxing
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /dev/shm:size=256m       # Browser shared memory
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'
    environment:
      - TZ=Asia/Jerusalem
      # Cron schedule: run every 8 hours (at midnight, 8am, 4pm)
      # Remove SCHEDULE to run once and exit
      - SCHEDULE=0 */8 * * *
      # Uncomment to decrypt encrypted credentials (see README → Encrypted Config)
      # - CREDENTIALS_ENCRYPTION_PASSWORD=your_encryption_password
      # Dry run: scrape banks and preview transactions without importing (see README → Config Validation)
      # - DRY_RUN=true
    volumes:
      - ./config.json:/app/config.json:ro             # Settings (serverURL: http://actual-server:5006)
      # - ./credentials.json:/app/credentials.json:ro  # Secrets (optional, see README)
      - importer-data:/app/data             # Actual Budget sync data
      - importer-cache:/app/cache           # App cache
      # - importer-chrome:/app/chrome-data  # Legacy (unused with Camoufox v7.9.0+)
    healthcheck:
      test: ["CMD", "ps", "aux"]
      interval: 5m
      timeout: 10s
      start_period: 30s
      retries: 3

# Named volumes for data persistence (survive container recreation)
volumes:
  actual-data:
  importer-data:
  importer-cache:
  # importer-chrome:  # Legacy (unused with Camoufox v7.9.0+)
