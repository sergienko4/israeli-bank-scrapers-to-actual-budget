rules:
  - id: async-recursion
    patterns:
      - pattern: |
          async $METHOD(...) {
            ...
            return this.$METHOD(...);
          }
    message: "Async recursion has no TCO in V8 — use iterative loop"
    severity: ERROR
    languages: [typescript]

  - id: telegram-html-injection
    patterns:
      - pattern: |
          `...<b>...</b>...${$VAR}...`
      - pattern-not: |
          `...${escapeHtml($VAR)}...`
    message: "HTML-escape user-controlled values in Telegram HTML messages"
    severity: ERROR
    languages: [typescript]

  - id: silent-empty-fallback
    pattern: extractQueryData($RESULT, [])
    message: "Don't silently fall back to [] — check query result first"
    severity: ERROR
    languages: [typescript]

  - id: prototype-pollution-in-check
    patterns:
      - pattern: if ($KEY in $MAP) ...
      - pattern-not: if ("..." in $MAP) ...
    message: "Use Object.hasOwn($MAP, $KEY) to prevent prototype pollution"
    severity: ERROR
    languages: [typescript]

  - id: unchecked-ensure-return
    pattern: |
      await this.ensure$METHOD(...);
    pattern-not: |
      $VAR = await this.ensure$METHOD(...);
    message: "ensure*() returns a boolean — check the return value"
    severity: ERROR
    languages: [typescript]

  - id: pii-in-info-log
    patterns:
      - pattern: getLogger().info(`...${$VAR}...`)
      - metavariable-regex:
          metavariable: $VAR
          regex: ".*(merchant|amount|payee|customerName|payeeName).*"
    message: "Don't log PII at info level — use getLogger().debug()"
    severity: ERROR
    languages: [typescript]
