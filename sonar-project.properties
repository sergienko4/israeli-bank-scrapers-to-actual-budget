# SonarCloud configuration
# Organization and project key are injected via GitHub Secrets

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.typescript.file.suffixes=.ts

# TypeScript coverage (lcov produced by vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=dist/**,node_modules/**,docs/**,config/**
sonar.test.exclusions=tests/**
sonar.coverage.exclusions=src/Index.ts,tests/**

# Quality thresholds aligned with vitest.config.ts
sonar.qualitygate.wait=true
